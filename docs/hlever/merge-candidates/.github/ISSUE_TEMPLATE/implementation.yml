name: Implementation
description: Build or change game/runtime behavior.
title: "[Implementation]: "
labels: ["implementation"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete behavior, validation, docs, and deploy expectations.
    validations:
      required: true
  - type: dropdown
    id: player_visible
    attributes:
      label: Player-visible?
      options:
        - "Yes, update docs or patch notes"
        - "No"
        - "Unsure"
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Required validation
      placeholder: "Example: npm run task:done, targeted regression test, staging probes"
