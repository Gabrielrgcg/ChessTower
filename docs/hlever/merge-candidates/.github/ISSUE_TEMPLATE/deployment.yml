name: Deployment
description: Stage, promote, or verify a deploy.
title: "[Deploy]: "
labels: ["deploy"]
body:
  - type: dropdown
    id: environment
    attributes:
      label: Target environment
      options:
        - staging
        - production
        - public docs
    validations:
      required: true
  - type: input
    id: candidate
    attributes:
      label: Candidate commit or PR
      placeholder: "<commit-sha-or-pr>"
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Required verification
      value: |
        - GET /healthz
        - GET /metrics
        - GET /api/release
        - player URL
        - public docs URL, if docs changed
    validations:
      required: true
