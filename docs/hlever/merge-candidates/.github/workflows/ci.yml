name: CI

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - staging
    paths:
      - ".github/workflows/**"
      - "e2e/**"
      - "eslint.config.*"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.*"
      - "public/**"
      - "public-site/**"
      - "scripts/**"
      - "server/**"
      - "src/**"
      - "test/**"
      - "tests/**"
      - "tsconfig*.json"
      - "vite*.config.*"
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run task:done
